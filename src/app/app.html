<!-- Tut 2 interpolcation and function -->
<h1>{{email}}</h1>

<!-- Tut 3 Event binding -->
<h1>Event binding</h1>
<button (click)="counter('minus')">-</button>
<span>{{count}}</span>
<button (click)="counter('plus')">+</button>
<!-- <button (click)="showUserName()"></button> -->

<!-- Tut 4 Imp events -->
<h1>Events</h1>
<input type="text" (input)="handleEvent($event.type)">
<input type="text" (change)="handleEvent($event.type)">
<input type="text" (blur)="handleEvent($event.type)">
<input type="text" (focus)="handleEvent($event.type)">
<button (click)="handleEvent($event.type)">Click</button>
<select name="" id="" (change)="handleEvent($event.type)">
    <option value="">car</option>
    <option value="">bike</option>
</select>
<br><br>
<div class="div1" (mouseleave)="handleEvent($event.type)"></div>
<br><br>
<div class=" div2" (mouseenter)="handleEvent($event.type)"></div>

<!-- Tut 5 Property binding -->
<h1>Property Binding</h1>
<button disabled="{{btnDisabled}}">Click me</button>
<br><br>
<button [disabled]="btnDisabled">Click me</button>
<br><br>
<button (click)="toggle()">Toggle</button>
<br><br>
<input type="text" readonly="{{inputReadonly}}">
<br><br>
<input type="text" [readonly]="inputReadonly">


<!-- Tut 6 Signals -->
<h1>Signals</h1>
<button (click)="updateData()">Update data</button>
<h2>{{data}}</h2>

<button (click)="updateValue()">Update value</button>
<h2>Signals : {{value()}}</h2>

<h1>Area:- {{area()}}</h1>
<h2>Height:- {{height()}}</h2>
<button (click)="updateHeight()">Update Height</button>
